name: PHA updater (4x daily)

on:
  schedule:
    # 00:00, 06:00, 12:00, 18:00 UTC
    - cron: "0 0,6,12,18 * * *"
  workflow_dispatch:
    inputs:
      tof_min:
        description: "Minimum TOF to search (days)"
        type: number
        default: 30
        required: false
      tof_max:
        description: "Maximum TOF to search (days)"
        type: number
        default: 180
        required: false

permissions:
  contents: write

concurrency:
  group: pha-updater
  cancel-in-progress: false

env:
  OUT_FILE:  data/hazardous_neos/latest.json
  XFER_FILE: data/hazardous_neos/latest_intercepts.json

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      # ---- Step 1: fetch NEO close approaches + SBDB orbital elements ----
      # Bug fix: was update_hazardous_neos.py (NeoWs feed — no orbital elements).
      # Switched to update_close_approaches.py which fetches from JPL CAD + SBDB
      # and embeds full Keplerian elements needed by the Lambert planner.
      - name: Fetch close approaches (CAD + SBDB elements)
        env:
          OUT_FILE: ${{ env.OUT_FILE }}
        run: |
          python -m scripts.update_close_approaches \
            --out  "$OUT_FILE" \
            --date-min now \
            --date-max +60 \
            --dist-max 0.05

      # ---- Step 2: Lambert transfer planning ----
      # Bug fix: was neo_intercept_planner.py called with --input/--output/--roll-past
      # flags that the argparser didn't recognise.  plan_intercepts.py is the
      # correct Lambert pipeline and uses --inp/--out.
      - name: Plan intercepts (Lambert grid search)
        env:
          TOF_MIN: ${{ inputs.tof_min || '30' }}
          TOF_MAX: ${{ inputs.tof_max || '180' }}
        run: |
          python -m scripts.plan_intercepts \
            --inp  "${{ env.OUT_FILE }}" \
            --out  "${{ env.XFER_FILE }}" \
            --tof-min "$TOF_MIN" \
            --tof-max "$TOF_MAX"

      # ---- Step 3: validate output ----
      - name: Validate intercept feed
        run: python -m scripts.validate_feed "${{ env.XFER_FILE }}"

      # ---- Step 4: commit updated JSON ----
      - name: Commit & push if changed
        env:
          GIT_AUTHOR_NAME:      Matthew Cranny
          GIT_AUTHOR_EMAIL:     163694578+mcranny@users.noreply.github.com
          GIT_COMMITTER_NAME:   Matthew Cranny
          GIT_COMMITTER_EMAIL:  163694578+mcranny@users.noreply.github.com
        run: |
          set -e
          git config user.name  "$GIT_AUTHOR_NAME"
          git config user.email "$GIT_AUTHOR_EMAIL"

          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          msg="CI: update hazardous NEO snapshot & intercepts $(date -u +'%Y-%m-%d %H:%MZ')"
          git commit -m "$msg"
          git push origin HEAD:main
